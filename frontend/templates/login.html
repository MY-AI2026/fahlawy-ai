<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Log in | Fahlawy AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#258cf4",
                "background-light": "#f5f7f8",
                "background-dark": "#101922",
              },
              fontFamily: {
                "display": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
            },
          },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<header class="flex items-center justify-between border-b border-primary/20 px-6 py-4 lg:px-40">
<div class="flex items-center gap-4 text-primary">
<div class="size-8 flex items-center justify-center">
<span class="material-symbols-outlined text-4xl">smart_toy</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight">Fahlawy AI</h2>
</div>
<div class="flex flex-1 justify-end items-center gap-4">
<span class="text-sm text-slate-500 dark:text-slate-400 hidden sm:block">Don't have an account?</span>
<a class="text-primary font-semibold text-sm hover:underline" href="/register">Sign up</a>
</div>
</header>
<main class="flex-1 flex justify-center items-center py-12 px-4">
<div class="w-full max-w-[480px] flex flex-col gap-8">
<div class="flex flex-col gap-2 text-center">
<h2 class="text-slate-900 dark:text-slate-100 text-3xl font-bold tracking-tight">Welcome back</h2>
<p class="text-slate-600 dark:text-slate-400 text-lg">Log in to manage your AI agents.</p>
</div>
<form class="flex flex-col gap-5" action="/dashboard" method="GET">
<div class="flex flex-col w-full">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold mb-2">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 dark:text-slate-400">mail</span>
<input class="w-full pl-12 pr-4 h-14 rounded-lg border border-primary/20 bg-white dark:bg-background-dark/50 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-500" placeholder="name@company.com" type="email" required/>
</div>
</div>
<div class="flex flex-col w-full">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold mb-2">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 dark:text-slate-400">lock</span>
<input class="w-full pl-12 pr-4 h-14 rounded-lg border border-primary/20 bg-white dark:bg-background-dark/50 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-500" placeholder="••••••••" type="password" required/>
</div>
</div>
<button class="mt-4 flex h-14 items-center justify-center rounded-lg bg-primary text-white text-base font-bold transition-all hover:bg-primary/90 hover:shadow-lg hover:shadow-primary/20 active:scale-[0.98]" type="submit">
                                    Log In
                                </button>
</form>
</div>
</main>
</div>
</div>
</body></html>
